name: CI/CD Pipeline - Azure Container Apps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  RG_NAME: rg-ensemble
  ACR_NAME: ensembleacr
  ENV_NAME: env-ensemble
  LOCATION: eastus

jobs:
  # ============================================================
  # BUILD & TEST
  # ============================================================
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          services=(api orchestrator model_service_1 model_service_2)
          for svc in "${services[@]}"; do
            echo "Building $svc..."
            docker build -t ${{ env.ACR_NAME }}.azurecr.io/$svc:${{ github.sha }} ./$svc
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/api:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

  # ============================================================
  # DEPLOY TO AZURE (only on main branch)
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push images
        run: |
          services=(api orchestrator model_service_1 model_service_2)
          for svc in "${services[@]}"; do
            echo "Building and pushing $svc..."
            docker build -t ${{ env.ACR_NAME }}.azurecr.io/$svc:${{ github.sha }} ./$svc
            docker push ${{ env.ACR_NAME }}.azurecr.io/$svc:${{ github.sha }}
            # Also tag as latest
            docker tag ${{ env.ACR_NAME }}.azurecr.io/$svc:${{ github.sha }} ${{ env.ACR_NAME }}.azurecr.io/$svc:latest
            docker push ${{ env.ACR_NAME }}.azurecr.io/$svc:latest
          done

      # ==========================================================
      # Deploy API Service
      # ==========================================================
      - name: Deploy API to Container Apps
        run: |
          az containerapp create \
            --name api-ensemble \
            --resource-group ${{ env.RG_NAME }} \
            --environment ${{ env.ENV_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/api:${{ github.sha }} \
            --target-port 8000 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 5 \
            --env-vars ORCH_URL="https://orchestrator-ensemble.${{ env.LOCATION }}.azurecontainerapps.io" \
            --registry-server ${{ env.ACR_NAME }}.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --cpu 0.5 \
            --memory 1Gi \
            --query properties.configuration.ingress.fqdn \
            --output tsv || \
          az containerapp update \
            --name api-ensemble \
            --resource-group ${{ env.RG_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/api:${{ github.sha }}

      # ==========================================================
      # Deploy Orchestrator Service
      # ==========================================================
      - name: Deploy Orchestrator to Container Apps
        run: |
          az containerapp create \
            --name orchestrator-ensemble \
            --resource-group ${{ env.RG_NAME }} \
            --environment ${{ env.ENV_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/orchestrator:${{ github.sha }} \
            --target-port 8001 \
            --ingress internal \
            --min-replicas 1 \
            --max-replicas 3 \
            --env-vars \
              MODEL_1_URL="https://model1-ensemble.${{ env.LOCATION }}.azurecontainerapps.io/predict" \
              MODEL_2_URL="https://model2-ensemble.${{ env.LOCATION }}.azurecontainerapps.io/predict" \
            --registry-server ${{ env.ACR_NAME }}.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --cpu 0.5 \
            --memory 1Gi \
            --query properties.configuration.ingress.fqdn \
            --output tsv || \
          az containerapp update \
            --name orchestrator-ensemble \
            --resource-group ${{ env.RG_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/orchestrator:${{ github.sha }}

      # ==========================================================
      # Deploy Model Service 1 (CPU)
      # ==========================================================
      - name: Deploy Model Service 1 to Container Apps
        run: |
          az containerapp create \
            --name model1-ensemble \
            --resource-group ${{ env.RG_NAME }} \
            --environment ${{ env.ENV_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/model_service_1:${{ github.sha }} \
            --target-port 8002 \
            --ingress internal \
            --min-replicas 1 \
            --max-replicas 3 \
            --env-vars MODEL_NAME="distilbert-base-uncased-finetuned-sst-2-english" DEVICE="cpu" \
            --registry-server ${{ env.ACR_NAME }}.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --cpu 1.0 \
            --memory 2Gi \
            --query properties.configuration.ingress.fqdn \
            --output tsv || \
          az containerapp update \
            --name model1-ensemble \
            --resource-group ${{ env.RG_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/model_service_1:${{ github.sha }}

      # ==========================================================
      # Deploy Model Service 2 (GPU-capable)
      # ==========================================================
      - name: Deploy Model Service 2 to Container Apps
        run: |
          az containerapp create \
            --name model2-ensemble \
            --resource-group ${{ env.RG_NAME }} \
            --environment ${{ env.ENV_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/model_service_2:${{ github.sha }} \
            --target-port 8003 \
            --ingress internal \
            --min-replicas 0 \
            --max-replicas 2 \
            --env-vars MODEL_NAME="gpt2-medium" DEVICE="cpu" \
            --registry-server ${{ env.ACR_NAME }}.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --cpu 2.0 \
            --memory 4Gi \
            --query properties.configuration.ingress.fqdn \
            --output tsv || \
          az containerapp update \
            --name model2-ensemble \
            --resource-group ${{ env.RG_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/model_service_2:${{ github.sha }}

      - name: Verify deployments
        run: |
          echo "API URL:"
          az containerapp show --name api-ensemble --resource-group ${{ env.RG_NAME }} --query properties.configuration.ingress.fqdn
          echo ""
          echo "Testing health endpoint..."
          API_URL=$(az containerapp show --name api-ensemble --resource-group ${{ env.RG_NAME }} --query properties.configuration.ingress.fqdn -o tsv)
          curl -s "https://$API_URL/health" || echo "Service may still be starting..."

  # ============================================================
  # POST-DEPLOYMENT TESTS
  # ============================================================
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run smoke tests
        run: |
          API_URL=$(az containerapp show --name api-ensemble --resource-group ${{ env.RG_NAME }} --query properties.configuration.ingress.fqdn -o tsv)
          API_URL="https://$API_URL"
          
          echo "Testing API health..."
          curl -s "$API_URL/health" | jq .
          
          echo ""
          echo "Testing prediction endpoint..."
          curl -s -X POST "$API_URL/predict" \
            -H "Content-Type: application/json" \
            -d '{"text": "This is an amazing product!"}' | jq .
          
          echo ""
          echo "Testing negative sentiment..."
          curl -s -X POST "$API_URL/predict" \
            -H "Content-Type: application/json" \
            -d '{"text": "I am very disappointed with this service."}' | jq .
